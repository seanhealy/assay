name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: cd example && npm ci
      - run: npx playwright install chromium firefox --with-deps
      - run: npm test
